project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.md"
    - "!ensino/**"
    - "!palestras/**"
    - "!artigos/**"
    - "!software/**"
    - "!README.md"
    - "!readme.md"
lang: pt
website:
  title: "Alexsandro Prado"
  site-url: "https://alexsandroprado.github.io/"
  favicon: "images/logo.ico"
  twitter-card: true
  description: "Econometria, Data Science e Contabilidade — análises aplicadas com R."
  back-to-top-navigation: true
  reader-mode: false
  search:
    location: navbar
    type: overlay
  navbar:
    type: dark
    background: "#0f2554"
    left:
      - href: blog/index.qmd
        text: Blog
      # - href: artigos/index.qmd
      #   text: Artigos
      # - href: palestras/index.qmd
      #   text: Palestras
      # - href: ensino/index.qmd
      #   text: Ensino
      # - href: software/index.qmd
      #   text: Software
      - text: Projetos
        menu:
          - text: GECOMT
            href: https://gecomt.github.io/
            target: _blank
          - text: Contabilidados
            href: https://contabilidados.com.br/
            target: _blank
          - text: Regulariza
            href: https://regulariza.shinyapps.io/dashboard/
            target: _blank

    right:
      - icon: github
        href: https://github.com/alexsandroprado
      - icon: twitter-x
        href: https://twitter.com/alexsandroprado
      - icon: youtube
        href: https://www.youtube.com/@profalexsandroprado
      - icon: rss
        href: blog/index.xml

  page-footer:
    left: "// alexsandro_prado · 2024"
    right:
      - icon: github
        href: https://github.com/alexsandroprado
      - icon: twitter-x
        href: https://twitter.com/alexsandroprado
    background: "#0f2554"

date-format: "YYYY-MM-DD"

format:
  html:
    theme:
      light: [united, styles.scss]
      dark:  [cyborg, styles-dark.scss]
    toc: true
    toc-depth: 3
    html-math-method: katex
    include-in-header:
      file: header.html
    code-copy: true
    code-overflow: wrap

